version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: blood_donation_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  db:
    image: postgis/postgis:14-3.3
    container_name: blood_donation_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: blood_donation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: blood_donation_backend
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/blood_donation
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30m}
      EMAIL_HOST: ${EMAIL_HOST:-smtp.example.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-dev@example.com}
      EMAIL_PASS: ${EMAIL_PASS:-dev-email-password}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      MONGODB_URL: mongodb://mongodb:27017/bloodconnect

  frontend:
    build: ./frontend
    container_name: blood_donation_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
  mongo_data:
